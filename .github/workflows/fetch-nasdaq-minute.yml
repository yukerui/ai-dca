name: Fetch Nasdaq ETF Minute Bars

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Target date in Asia/Shanghai, format YYYY-MM-DD"
        required: false
        type: string
  schedule:
    - cron: "30 7 * * 1-5"

permissions:
  contents: write

jobs:
  fetch-minute-bars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-nasdaq-minute.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-nasdaq-minute.txt

      - name: Resolve target date
        shell: bash
        run: |
          if [ -n "${{ inputs.target_date }}" ]; then
            echo "TARGET_DATE=${{ inputs.target_date }}" >> "$GITHUB_ENV"
          else
            echo "TARGET_DATE=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_ENV"
          fi

      - name: Fetch minute bars
        run: python scripts/fetch_nasdaq_etf_minute.py --target-date "${TARGET_DATE}" --skip-existing

      - name: Commit and push data updates
        shell: bash
        run: |
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data: update nasdaq etf minute bars for ${TARGET_DATE}"
          git push
